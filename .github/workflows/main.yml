name: RasFocus Windows Build (One-File EXE)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'

    - name: Setup MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build RasFocus (C++)
      run: |
        qmake RasFocus.pro
        nmake release

    - name: Prepare Deployment Directory
      run: |
        mkdir dist
        copy release\RasFocus+AdultBlocker.exe dist\
        # windeployqt সব প্রয়োজনীয় C++ DLL গুলোকে dist ফোল্ডারে নিয়ে আসবে
        windeployqt --no-translations dist\RasFocus+AdultBlocker.exe

    # ১. এনিগমা ভার্চুয়াল বক্স ইন্সটল করা (এটি সি++ এর জন্য সেরা)
    - name: Install Enigma Virtual Box
      run: choco install enigma-virtual-box -y

    # ২. সব DLL এবং EXE কে একটি ফাইলে প্যাক করা
    - name: Pack Everything into One File
      shell: pwsh
      run: |
        $exePath = "dist\RasFocus+AdultBlocker.exe"
        $outPath = "RasFocus_Standalone.exe"
        
        # একটি কনফিগারেশন ফাইল তৈরি করা যাতে সব ফাইল এমবেড হয়
        # এখানে এনিগমা অটোমেটিক ডিস্ট ফোল্ডারের ফাইলগুলো প্যাক করে নিবে
        & "C:\Program Files (x86)\Enigma Virtual Box\enigmavbconsole.exe" gen RasFocus.evb $exePath $outPath dist
        & "C:\Program Files (x86)\Enigma Virtual Box\enigmavbconsole.exe" RasFocus.evb

    - name: Upload Single Executable
      uses: actions/upload-artifact@v4
      with:
        name: RasFocus-Single-File
        path: RasFocus_Standalone.exe
