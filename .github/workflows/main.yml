name: RasFocus Windows Build (One-File EXE)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'

    - name: Setup MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build RasFocus (C++)
      run: |
        qmake RasFocus.pro
        nmake release

    - name: Prepare Deployment Directory
      run: |
        mkdir dist
        copy release\RasFocus+AdultBlocker.exe dist\
        windeployqt --no-translations dist\RasFocus+AdultBlocker.exe

    # নতুন পদ্ধতি: Warp Packer ডাউনলোড করা (সরাসরি গিটহাব রিলিজ থেকে, যা ব্লক হবে না)
    - name: Download Warp Packer
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://github.com/dgiagio/warp/releases/download/v0.3.0/windows-x64.warp-packer.exe" -OutFile "warp-packer.exe"

    # dist ফোল্ডারের সবকিছু একটি ফাইলে প্যাক করা
    - name: Pack Everything into One File
      run: |
        .\warp-packer.exe --arch windows-x64 --input_dir dist --exec "RasFocus+AdultBlocker.exe" --output RasFocus_Standalone.exe

    - name: Upload Single Executable
      uses: actions/upload-artifact@v4
      with:
        name: RasFocus-Single-File
        path: RasFocus_Standalone.exe
