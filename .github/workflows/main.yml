name: RasFocus Windows Standalone Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-static:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # MSYS2 এর মাধ্যমে আগে থেকে কম্পাইল করা Static Qt নামানো হচ্ছে
    - name: Setup MSYS2 and Static Qt5
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-qt5-static

    # CMake দিয়ে প্রোজেক্ট বিল্ড করা হচ্ছে (qmake এর বদলে)
    - name: Build RasFocus Standalone
      run: |
        mkdir build
        cd build
        cmake .. -G "Ninja" -DCMAKE_BUILD_TYPE=Release
        cmake --build .

    # শুধুমাত্র বিল্ড হওয়া একটিমাত্র .exe ফাইল আপলোড করা হচ্ছে (কোনো DLL ছাড়া)
    - name: Upload Single EXE
      uses: actions/upload-artifact@v4
      with:
        name: RasFocus-Standalone-Pack
        path: build/RasFocus_Pro.exe
