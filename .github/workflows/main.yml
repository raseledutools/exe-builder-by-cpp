name: RasFocus Windows Build (One-File EXE)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'

    - name: Setup MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build RasFocus (C++)
      run: |
        qmake RasFocus.pro
        nmake release

    - name: Prepare Deployment Directory
      run: |
        mkdir dist
        copy release\RasFocus+AdultBlocker.exe dist\
        windeployqt --no-translations dist\RasFocus+AdultBlocker.exe

    # Chocolatey ব্যর্থ হওয়ায় সরাসরি ডাউনলোড এবং ইন্সটল
    - name: Download and Install Enigma Virtual Box
      shell: pwsh
      run: |
        curl -L "https://enigmaprotector.com/assets/files/evb_setup.exe" -o evb_setup.exe
        Start-Process -FilePath .\evb_setup.exe -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait

    - name: Pack Everything into One File
      shell: pwsh
      run: |
        $exePath = "dist\RasFocus+AdultBlocker.exe"
        $outPath = "RasFocus_Standalone.exe"
        $evbConsole = "C:\Program Files (x86)\Enigma Virtual Box\enigmavbconsole.exe"
        
        # জেনারেট প্রজেক্ট ফাইল এবং প্যাক করা
        & $evbConsole gen RasFocus.evb $exePath $outPath dist
        & $evbConsole RasFocus.evb

    - name: Upload Single Executable
      uses: actions/upload-artifact@v4
      with:
        name: RasFocus-Single-File
        path: RasFocus_Standalone.exe
