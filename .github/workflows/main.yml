name: RasFocus Windows Standalone Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-static:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSYS2 and Static Qt5
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-qt5-static
          mingw-w64-x86_64-make

    - name: Build with qmake (Static Qt)
      run: |
        export PATH="/mingw64/qt5-static/bin:$PATH"
        mkdir build
        cd build
        qmake ../RasFocus+AdultBlocker.pro \
          CONFIG+=release \
          CONFIG+=static
        mingw32-make -j$(nproc)

    - name: Rename EXE
      run: |
        mv build/release/RasFocus+AdultBlocker.exe build/RasFocus_Pro.exe || \
        mv build/RasFocus+AdultBlocker.exe build/RasFocus_Pro.exe || \
        find build -name "*.exe" -exec mv {} build/RasFocus_Pro.exe \;

    - name: Upload Single EXE
      uses: actions/upload-artifact@v4
      with:
        name: RasFocus-Standalone-Pack
        path: build/RasFocus_Pro.exe
