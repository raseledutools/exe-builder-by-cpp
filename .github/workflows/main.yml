name: RasFocus Windows Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'

    # এই স্টেপটি নতুন অ্যাড করা হয়েছে (MSVC কম্পাইলার রেডি করার জন্য)
    - name: Setup MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build RasFocus
      run: |
        qmake RasFocus.pro
        nmake release

    - name: Package Dependencies (windeployqt)
      run: |
        mkdir dist
        copy release\RasFocus+AdultBlocker.exe dist\
        windeployqt dist\RasFocus+AdultBlocker.exe

    - name: Upload Finished Project
      uses: actions/upload-artifact@v4
      with:
        name: RasFocus-Release-Pack
        path: dist/
